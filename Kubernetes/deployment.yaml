apiVersion: apps/v1
kind: Deployment
metadata:
  name: intens-deployment
spec:
  selector:
    matchLabels:
      app: intens
  replicas: 2
  template:
    metadata:
      labels:
        app: intens
    spec:
      containers:
      - name: intens
        image: ghcr.io/k-atarinavujovic/intens-api-2022:master
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
